configmap:
  data:
    conf:
      env-prefix: "NITROCI"
    parent-chain:
      sequencer-inbox-address: "0x6c97864CE4bEf387dE0b3310A44230f7E3F1be0D"
    data-availability:
      local-file-storage:
        enable: true
        data-dir: "/data/das-storage"
      rest-aggregator:
        enable: true
        online-url-list: https://nova.arbitrum.io/das-servers
        sync-to-storage:
          eager: true
          eager-lower-bound-block: 15025611
          state-dir: /data/das-storage/syncState
      key:
        priv-key: ""
    enable-rpc: true

extraEnv:
  - name: NITROCI_PARENT__CHAIN_NODE__URL
    valueFrom:
      secretKeyRef:
        name: ci-secret-nitro
        key: PARENT_CHAIN_URL_SEPOLIA

ci:
  secretManifest:
    enabled: true
